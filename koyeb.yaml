# Koyeb configuration file for BeatMaps
# Deploy this static site to Koyeb with Docker

services:
  - name: beatmaps
    type: web
    build:
      type: docker
      dockerfile: ./Dockerfile
    ports:
      - 80:http
    regions:
      - fra     # Frankfurt (Europe)
      - was     # Washington DC (US East)
      - sjc     # San Jose (US West)
    scale:
      min: 1
      max: 1
    health:
      path: /
      interval: 30
      timeout: 5
    env:
      - TZ=UTC
